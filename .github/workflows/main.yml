name: Booking Monitor

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Create storage directories
        run: |
          mkdir -p storage
          mkdir -p screenshots

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: storage
          key: booking-monitor-state-${{ github.run_id }}
          restore-keys: |
            booking-monitor-state-

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BOOKING_URL: ${{ secrets.BOOKING_URL }}
          AI_ENABLED: "true"
          AI_API_URL: ${{ secrets.AI_API_URL || 'https://integrate.api.nvidia.com/v1' }}
          AI_API_KEY: ${{ secrets.AI_API_KEY || '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' }}
          AI_MODEL_NAME: ${{ secrets.AI_MODEL_NAME || 'meta/llama-3.1-70b-instruct' }}
        run: npm run monitor

      - name: Save state cache
        if: always()
        uses: actions/cache@v4
        with:
          path: storage
          key: booking-monitor-state-${{ github.run_id }}
