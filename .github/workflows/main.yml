name: Booking Monitor

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: booking-monitor/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: booking-monitor

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps
        working-directory: booking-monitor

      - name: Restore State
        uses: actions/cache@v4
        with:
          path: booking-monitor/storage
          key: ${{ runner.os }}-booking-state-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-booking-state-

      - name: Run Monitor
        run: npm run monitor
        working-directory: booking-monitor
        env:
          BOOKING_URL: ${{ secrets.BOOKING_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HEADLESS: true
          STATE_FILE_PATH: ./storage/state.json
          SCREENSHOTS_DIR: ./screenshots

      - name: Save State
        if: always()
        uses: actions/cache/save@v4
        with:
          path: booking-monitor/storage
          key: ${{ runner.os }}-booking-state-${{ github.run_id }}
